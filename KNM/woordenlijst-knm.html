<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KNM Woordenlijst</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f1729;
  --bg2: #182040;
  --card: rgba(30,42,74,0.7);
  --glass: rgba(255,255,255,0.04);
  --t1: #f0f2f8;
  --t2: #a0aac4;
  --tm: #6b7a9e;
  --blue: #4e8cff;
  --blue-g: rgba(78,140,255,0.2);
  --orange: #ff8a4e;
  --orange-g: rgba(255,138,78,0.18);
  --green: #34d399;
  --green-g: rgba(52,211,153,0.18);
  --purple: #a78bfa;
  --purple-g: rgba(167,139,250,0.18);
  --yellow: #fbbf24;
  --yellow-g: rgba(251,191,36,0.15);
  --b1: rgba(255,255,255,0.07);
  --b2: rgba(255,255,255,0.12);
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px;
  --sh: 0 4px 24px rgba(0,0,0,0.28);
  --tr: 0.22s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--t1);
  line-height:1.65;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(78,140,255,.06) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 20%,rgba(167,139,250,.05) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 85%,rgba(52,211,153,.04) 0%,transparent 55%);
  z-index:-1;pointer-events:none;
  animation:bgS 22s ease-in-out infinite alternate;
}
@keyframes bgS{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-3%,-3%) rotate(3deg)}}

/* ── Language Bar ── */
.lang-bar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px 24px;
  background:rgba(15,23,41,.88);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--b1);
}
.lang-bar .lbl{font-size:.75rem;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-right:4px}
.lang-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;
  font-size:.8rem;font-weight:600;
  color:var(--t2);
  background:var(--glass);
  border:1px solid var(--b1);
  border-radius:100px;cursor:pointer;
  transition:var(--tr);user-select:none;font-family:'Inter',sans-serif;
}
.lang-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-g)}
.lang-btn.active{color:var(--blue);border-color:var(--blue);background:var(--blue-g)}
.lang-btn .flag{font-size:1rem}

/* RTL hint badge */
.rtl-badge{
  font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  padding:2px 6px;border-radius:100px;
  background:var(--orange);color:#fff;margin-left:2px;
}

/* ── Page ── */
.page{max-width:1060px;margin:0 auto;padding:36px 20px 80px}

.page-header{text-align:center;margin-bottom:44px}
.page-header h1{
  font-family:'Outfit',sans-serif;
  font-size:clamp(1.9rem,5vw,3rem);font-weight:800;
  background:linear-gradient(135deg,#fff 0%,var(--blue) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;margin-bottom:10px;
}
.page-header .sub{font-size:1rem;color:var(--t2)}

/* ── Search bar ── */
.search-wrap{display:flex;justify-content:center;margin-bottom:36px}
.search-wrap input{
  width:100%;max-width:480px;
  padding:12px 20px;
  background:var(--card);
  border:1px solid var(--b2);
  border-radius:100px;
  color:var(--t1);
  font-size:.95rem;font-family:'Inter',sans-serif;
  outline:none;transition:var(--tr);
}
.search-wrap input::placeholder{color:var(--tm)}
.search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-g)}

/* ── Word grid ── */
.word-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;
}

/* ── Word card ── */
.word-card{
  background:var(--card);
  border:1px solid var(--b1);
  border-radius:var(--r-lg);
  box-shadow:var(--sh);
  overflow:hidden;
  transition:var(--tr);
  animation:fadeUp .35s ease both;
}
.word-card:hover{transform:translateY(-3px);border-color:rgba(78,140,255,.35);box-shadow:var(--sh),0 0 28px var(--blue-g)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* NL strip */
.card-nl{
  display:flex;align-items:center;gap:10px;
  padding:16px 20px 14px;
  border-bottom:1px solid var(--b1);
  background:rgba(78,140,255,.07);
}
.card-nl .nl-word{
  font-family:'Outfit',sans-serif;
  font-size:1.15rem;font-weight:800;
  color:var(--t1);flex:1;
}
.card-nl .nl-flag{font-size:1.25rem}

/* Translation strip */
.card-trans{
  display:flex;align-items:flex-start;gap:10px;
  padding:13px 20px 10px;
  border-bottom:1px solid var(--b1);
}
.card-trans .trans-flag{font-size:1rem;margin-top:2px;flex-shrink:0}
.card-trans .trans-text{
  font-size:1rem;font-weight:600;
  color:var(--blue);flex:1;
  word-break:break-word;
}
.card-trans .trans-text.rtl{direction:rtl;text-align:right;font-size:1rem}

/* Explanation strip */
.card-uitleg{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 20px 16px;
}
.card-uitleg .uitleg-icon{font-size:.95rem;flex-shrink:0;margin-top:2px;opacity:.7}
.card-uitleg .uitleg-text{
  font-size:.88rem;color:var(--t2);
  font-style:italic;flex:1;
  word-break:break-word;
}
.card-uitleg .uitleg-text.rtl{direction:rtl;text-align:right}

/* hidden */
.word-card.hidden{display:none}

/* ── Letter group header ── */
.letter-group{
  grid-column:1/-1;
  display:flex;align-items:center;gap:14px;
  margin-top:8px;
}
.letter-group .letter-badge{
  font-family:'Outfit',sans-serif;
  font-size:1.6rem;font-weight:800;
  color:var(--purple);
  width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  background:var(--purple-g);
  border-radius:var(--r-md);flex-shrink:0;
}
.letter-group .letter-line{flex:1;height:1px;background:linear-gradient(90deg,var(--b2),transparent)}

/* ── Count badge ── */
.count-bar{text-align:center;margin-bottom:24px;color:var(--tm);font-size:.85rem}
</style>
</head>

</nav>

// Flags per language
const FLAGS = {en:'🇬🇧',tr:'🇹🇷',th:'🇹🇭',vi:'🇻🇳',fa:'🇮🇷',ar:'🇸🇦',nl:'🇳🇱',pl:'🇵🇱'};
const RTL   = {fa:true,ar:true};

let currentLang = 'nl';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + lang).classList.add('active');
  buildGrid(document.getElementById('search').value.trim().toLowerCase());
}

function buildGrid(query) {
  const grid = document.getElementById('word-grid');
  grid.innerHTML = '';
  let letter = '';
  let shown  = 0;

  WORDS.forEach((w, idx) => {
    const nlLower = w.nl.toLowerCase();
    const transLower = (w[currentLang] || '').toLowerCase();
    if (query && !nlLower.includes(query) && !transLower.includes(query)) return;

    // Letter group
    const firstLetter = w.nl[0].toUpperCase();
    if (firstLetter !== letter) {
      letter = firstLetter;
      const gh = document.createElement('div');
      gh.className = 'letter-group';
      gh.innerHTML = `<div class="letter-badge">${letter}</div><div class="letter-line"></div>`;
      grid.appendChild(gh);
    }

    const isRtl = !!RTL[currentLang];
    const trans  = w[currentLang]          || '';
    const uitleg = w[currentLang + 'X']    || '';

    const card = document.createElement('div');
    card.className = 'word-card';
    card.style.animationDelay = (shown * 0.04) + 's';

    card.innerHTML = `
      <div class="card-nl">
        <span class="nl-flag">🇳🇱</span>
        <span class="nl-word">${w.nl}</span>
      </div>
      <div class="card-trans">
        <span class="trans-flag">${FLAGS[currentLang]}</span>
        <span class="trans-text${isRtl ? ' rtl' : ''}">${trans}</span>
      </div>
      ${uitleg ? `<div class="card-uitleg">
        <span class="uitleg-icon">💬</span>
        <span class="uitleg-text${isRtl ? ' rtl' : ''}">${uitleg}</span>
      </div>` : ''}
    `;
    grid.appendChild(card);
    shown++;
  });

  document.getElementById('count-bar').textContent = shown + ' woorden';
}

function filterCards() {
  buildGrid(document.getElementById('search').value.trim().toLowerCase());
}

// Init
buildGrid('');
